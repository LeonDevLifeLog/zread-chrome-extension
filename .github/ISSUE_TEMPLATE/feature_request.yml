name: 💡 Feature request
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想要解决的问题
      description: 这个功能是为了解决什么痛点？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望按钮/行为如何变化？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案（可选）
      description: 是否考虑过其他实现方式？
  - type: textarea
    id: context
    attributes:
      label: 补充信息（可选）
      description: 截图、参考链接、相关 issue 等
