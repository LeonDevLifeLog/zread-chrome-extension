<svg xmlns="http://www.w3.org/2000/svg" width="760" height="150" viewBox="0 0 760 150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- background -->
  <rect width="760" height="150" fill="#0d1117"/>
  <!-- repo title -->
  <text x="24" y="44" fill="#8b949e" font-size="15">hwameistor /</text>
  <text x="120" y="44" fill="#e6edf3" font-size="15" font-weight="600">hwameistor</text>
  <rect x="232" y="30" width="58" height="22" rx="11" fill="#21262d" stroke="#30363d"/>
  <text x="261" y="45" fill="#8b949e" font-size="12" text-anchor="middle">Public</text>

  <!-- action bar (right aligned area) -->
  <g transform="translate(470,28)">
    <!-- our injected button (left of Watch) -->
    <rect x="0" y="0" width="120" height="28" rx="6" fill="url(#grad)"/>
    <text x="20" y="19" fill="#ffffff" font-size="13" font-weight="600">⚡ zread.ai</text>

    <!-- Watch -->
    <rect x="132" y="0" width="92" height="28" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="178" y="19" fill="#e6edf3" font-size="13" text-anchor="middle">Watch</text>

    <!-- Fork -->
    <rect x="240" y="0" width="86" height="28" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="283" y="19" fill="#e6edf3" font-size="13" text-anchor="middle">Fork</text>

    <!-- Star -->
    <rect x="344" y="0" width="92" height="28" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="390" y="19" fill="#e6edf3" font-size="13" text-anchor="middle">Star</text>
  </g>

  <!-- arrow + caption -->
  <text x="494" y="78" fill="#d946ef" font-size="12">▲ 高亮按钮注入在 Watch 左侧</text>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
</svg>
